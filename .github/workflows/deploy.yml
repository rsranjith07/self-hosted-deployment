name: 🚀 Angular Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: npm install

      - name: Run App
        run: |
          pm2 delete angular-app || true
          pm2 start "npm start" --name "angular-app"
